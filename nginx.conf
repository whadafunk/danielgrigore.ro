# Nginx configuration for danielgrigore.ro
# Copy this to /etc/nginx/sites-available/danielgrigore.ro
# Then: sudo ln -s /etc/nginx/sites-available/danielgrigore.ro /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Restart: sudo systemctl restart nginx

server {
    listen 80;
    server_name danielgrigore.ro www.danielgrigore.ro;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name danielgrigore.ro www.danielgrigore.ro;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/danielgrigore.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/danielgrigore.ro/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root directory where Astro builds to
    root /var/www/danielgrigore.ro;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript text/xml application/xml+rss;

    # Cache Astro's fingerprinted assets forever (_astro/*.hash.js/css)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets for 30 days
    location ~* \.(jpg|jpeg|png|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Cache CSS/JS (general, not fingerprinted) for 7 days
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Don't cache HTML files (they might change)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate, public";
    }

    # Main page
    location = / {
        try_files $uri $uri/ =404;
    }

    # Fallback for all other requests — try as file, then as directory, then 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Deny access to hidden files and git
    location ~ /\. {
        deny all;
    }

    location ~ /.git/ {
        deny all;
    }

    # Error pages (optional, Astro includes 404 handling)
    error_page 404 /404.html;
}
